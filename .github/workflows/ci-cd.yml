name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@7957bd96aca8ba12377392ea3c557c235d6fe929 # v8.1.6
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@7957bd96aca8ba12377392ea3c557c235d6fe929 # v8.1.6
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@7957bd96aca8ba12377392ea3c557c235d6fe929 # v8.1.6
  test:
    uses: vidavidorra/.github/.github/workflows/node-test.yml@7957bd96aca8ba12377392ea3c557c235d6fe929 # v8.1.6
  code-coverage:
    uses: vidavidorra/.github/.github/workflows/node-test-coverage.yml@7957bd96aca8ba12377392ea3c557c235d6fe929 # v8.1.6
    needs:
      - lint
      - build
      - test
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@7957bd96aca8ba12377392ea3c557c235d6fe929 # v8.1.6
    needs:
      - lint-commit-messages
      - lint
      - build
      - test
      - code-coverage
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
