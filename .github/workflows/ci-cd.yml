name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@860270074a02c0fdab23000ba8c183f68f4bc9ca # v8.1.4
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@860270074a02c0fdab23000ba8c183f68f4bc9ca # v8.1.4
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@860270074a02c0fdab23000ba8c183f68f4bc9ca # v8.1.4
  test:
    uses: vidavidorra/.github/.github/workflows/node-test.yml@860270074a02c0fdab23000ba8c183f68f4bc9ca # v8.1.4
  code-coverage:
    uses: vidavidorra/.github/.github/workflows/node-test-coverage.yml@860270074a02c0fdab23000ba8c183f68f4bc9ca # v8.1.4
    needs:
      - lint
      - build
      - test
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@860270074a02c0fdab23000ba8c183f68f4bc9ca # v8.1.4
    needs:
      - lint-commit-messages
      - lint
      - build
      - test
      - code-coverage
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
